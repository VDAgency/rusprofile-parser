<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Парсер компаний</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Поиск компаний</h1>
        <p class="subtitle">Настройте фильтры и запустите парсинг</p>

        <form id="searchForm">

            <!-- Текстовый запрос -->
            <div class="form-group">
                <label for="query">Текст запроса</label>
                <input type="text" id="query" name="query"
                       placeholder="Название, ИНН, ОГРН, руководитель">
            </div>

            <!-- Регион -->
            <div class="form-group">
                <label for="region">Регион</label>
                <select id="region" name="region">
                    <option value="">Все регионы</option>
                </select>
            </div>

            <!-- ОКВЭД -->
            <div class="form-group">
                <label for="okved">ОКВЭД (код)</label>
                <input type="text" id="okved" name="okved"
                       placeholder="Напр. 46.90 — можно несколько через запятую">
                <div class="hint">Поддерживается несколько кодов через запятую.</div>
            </div>

            <!-- Статус -->
            <div class="form-group">
                <label>Статус</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="status" value="1" checked>
                        <span>Действующая</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="status" value="2">
                        <span>Реорганизация</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="status" value="3">
                        <span>Ликвидация</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="status" value="4">
                        <span>Банкротство</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="status" value="5">
                        <span>Ликвидирована</span>
                    </label>
                </div>
            </div>

            <!-- Правовая форма -->
            <div class="form-group">
                <label>Правовая форма</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="okopf" value="12165,12300">
                        <span>ООО</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="okopf" value="12200">
                        <span>АО</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="okopf" value="12247">
                        <span>ПАО</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="okopf" value="12267">
                        <span>НАО</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="okopf" value="50102">
                        <span>ИП</span>
                    </label>
                </div>
            </div>

            <!-- Реестр МСП -->
            <div class="form-group">
                <label>Реестр МСП</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="msp" value="MICRO">
                        <span>Микро</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="msp" value="SMALL">
                        <span>Малое</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="msp" value="MEDIUM">
                        <span>Среднее</span>
                    </label>
                </div>
            </div>

            <!-- Выручка -->
            <div class="form-group">
                <label>Выручка за год, руб.</label>
                <div class="range-inputs">
                    <input type="number" id="finance_revenue_from" name="finance_revenue_from"
                           placeholder="От" min="0">
                    <span class="separator">—</span>
                    <input type="number" id="finance_revenue_to" name="finance_revenue_to"
                           placeholder="До" min="0">
                </div>
            </div>

            <!-- Прибыль -->
            <div class="form-group">
                <label>Прибыль за год, руб.</label>
                <div class="range-inputs">
                    <input type="number" id="finance_profit_from" name="finance_profit_from"
                           placeholder="От">
                    <span class="separator">—</span>
                    <input type="number" id="finance_profit_to" name="finance_profit_to"
                           placeholder="До">
                </div>
            </div>

            <!-- Численность сотрудников -->
            <div class="form-group">
                <label>Сотрудников (среднесписочная)</label>
                <div class="range-inputs">
                    <input type="number" id="sshr_from" name="sshr_from"
                           placeholder="От" min="0">
                    <span class="separator">—</span>
                    <input type="number" id="sshr_to" name="sshr_to"
                           placeholder="До" min="0">
                </div>
            </div>

            <!-- Уставный капитал -->
            <div class="form-group">
                <label>Уставный капитал, руб.</label>
                <div class="range-inputs">
                    <input type="number" id="capital_from" name="capital_from"
                           placeholder="От" min="0">
                    <span class="separator">—</span>
                    <input type="number" id="capital_to" name="capital_to"
                           placeholder="До" min="0">
                </div>
            </div>

            <!-- Наличие контактов -->
            <div class="form-group">
                <label>Наличие контактов</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="has_phones" name="has_phones">
                        <span>Телефон</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="has_sites" name="has_sites">
                        <span>Сайт</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="has_emails" name="has_emails">
                        <span>Email</span>
                    </label>
                </div>
            </div>

            <!-- Доп. фильтры -->
            <div class="form-group">
                <label>Дополнительно</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="finance_has_actual_year_data"
                               name="finance_has_actual_year_data">
                        <span>Есть отчёт за год</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="not_defendant" name="not_defendant">
                        <span>Не был ответчиком</span>
                    </label>
                </div>
            </div>

            <!-- Кнопка запуска -->
            <button type="submit" id="submitBtn" class="btn-primary">
                Запустить парсинг
            </button>
        </form>

        <!-- Статус -->
        <div id="statusBlock" class="status-block hidden">
            <div class="status-text" id="statusText">Подготовка...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-info" id="progressInfo"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
